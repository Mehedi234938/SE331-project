<h2>Login</h2>

<input id="uid" placeholder="UID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="goSignup()">Signup</button>
<button onclick="goReset()">Forgot Password</button>

<script>
function login(){
fetch("http://127.0.0.1:5000/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
    uid:uid.value,
    password:pass.value
})
})
.then(r=>r.json())
.then(d=>{
    if(d.status==="ok"){
        if(d.role==="admin"){
            location.href="admin.html";
        }else{
            location.href="index.html";
        }
    }else{
        alert("Invalid Login");
    }
});
}

function goSignup(){ location.href="signup.html"; }
function goReset(){ location.href="reset.html"; }
</script>
